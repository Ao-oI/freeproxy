name: update proxies.json

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update proxies.json
        run: python scripts/update_proxies.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proxies.json
          # 如果没有变化就跳过提交，不报错
          git commit -m "Update proxies.json [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed or nothing to push"

      - name: Push to n8n
        continue-on-error: true # 即使 n8n 挂了也不要让任务报错
        run: |
          echo "Sending data to n8n.ulife.vip..."
          curl -f -X POST \
            -H "Content-Type: application/json" \
            -d @proxies.json \
            "https://n8n.ulife.vip/webhook/proxy-update" || echo "n8n delivery failed, but proxies are saved in GitHub."
